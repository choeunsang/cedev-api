# ===================================================================
# ⭐ [수정 핵심] 스프링 부트 4.x 표준 exclude 문법 적용 및 불필요 모듈 완전 차단
# JPA, 데이터 레포지토리, 하이버네이트 검증 기능 엔진이 메모리에 올라가는 것을 원천 봉쇄합니다.
# ===================================================================
spring.boot.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.validation.ValidationAutoConfiguration

# 2. JPA 웹 뷰 경고 및 하이버네이트 유효성 검사 완전 비활성화
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

# 3. 방언(Dialect) 수동 지정 (JPA 의존성 잔재로 인한 컴파일 에러 예방 방어선)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# 4. 정적 자원(Welcome Page) 25초 병목 구간 패스
spring.web.resources.add-mappings=false

# 5. HikariCP 커넥션 풀 최적화
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
