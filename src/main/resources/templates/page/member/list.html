<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org"> <!-- 🛑 타임리프 선언 필수 -->
<head>
    <meta charset="UTF-8">
    <title>Member List</title>
</head>
<body>
    <div> member list </div>
    <div>
        <table border="1">
            <thead>
                <tr>
                    <th>회원 ID</th>
					<th>회원 PW</th>
                    <th>회원 이름</th>
                </tr>
            </thead>
            <tbody>
                <!-- 🛑 백엔드에서 보낸 ${list} 반복 수행 -->
                <tr th:each="user : ${list}">
                    <!-- 
                       ⚠️ 중요: 아래 user.userId와 user.userName 부분은 
                       실제 UserDto.java 클래스에 선언된 정확한 변수명으로 적어주셔야 합니다.
                    -->
                    <td th:text="${user.userId}">아이디 자리</td>
					<td th:text="${user.userPw}">pw</td>
                    <td th:text="${user.userName}">이름 자리</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
